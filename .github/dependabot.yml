version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/web"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      patch-and-minor:
        patterns: ["*"]
        update-types: ["patch", "minor"]
      major-updates:
        patterns: ["*"]
        update-types: ["major"]
    labels: ["dependencies"]
    commit-message:
      prefix: "chore(deps):"
